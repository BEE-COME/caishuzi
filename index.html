<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    <title>猜数字辅助工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0A84FF;
            --primary-glow: rgba(10, 132, 255, 0.5);
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --bg-input: #0f3460;
            --text-primary: #eaeaea;
            --text-secondary: #a0a0a0;
            --danger: #ff4757;
            --success: #2ed573;
            --warning: #ffa502;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 布局容器 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* PC端双栏布局 */
        @media (min-width: 769px) {
            .main-layout {
                display: grid;
                grid-template-columns: 400px 1fr;
                gap: 20px;
            }
        }

        /* 移动端单栏布局 */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            .main-layout {
                display: flex;
                flex-direction: column;
            }
        }

        /* 卡片样式 */
        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 输入框样式 */
        .input-group {
            margin-bottom: 16px;
        }

        .input-label {
            display: block;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-input);
            border: 2px solid transparent;
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 18px;
            text-align: center;
            letter-spacing: 4px;
            transition: all 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        /* 秘密数字加密显示 */
        .secret-container {
            position: relative;
        }

        .secret-display {
            font-size: 32px;
            letter-spacing: 8px;
            text-align: center;
            padding: 20px;
            background: var(--bg-input);
            border-radius: 12px;
            cursor: pointer;
            user-select: none;
        }

        .secret-eye {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
        }

        /* 单选按钮组 */
        .radio-group {
            display: flex;
            gap: 12px;
        }

        .radio-option {
            flex: 1;
            position: relative;
        }

        .radio-option input[type="radio"] {
            position: absolute;
            opacity: 0;
        }

        .radio-label {
            display: block;
            padding: 14px;
            background: var(--bg-input);
            border: 2px solid transparent;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .radio-option input[type="radio"]:checked + .radio-label {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        /* 按钮样式 */
        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #0066cc);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--primary-glow);
        }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text-primary);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        /* 算法建议区域 - 荧光边框特效 */
        .suggestion-box {
            background: linear-gradient(135deg, var(--bg-input), var(--bg-card));
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            border: 3px solid var(--primary);
            box-shadow: 0 0 30px var(--primary-glow), inset 0 0 30px rgba(10, 132, 255, 0.1);
            animation: glow-pulse 2s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% { box-shadow: 0 0 30px var(--primary-glow), inset 0 0 30px rgba(10, 132, 255, 0.1); }
            50% { box-shadow: 0 0 50px var(--primary-glow), inset 0 0 50px rgba(10, 132, 255, 0.2); }
        }

        .suggestion-number {
            font-size: 48px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 6px;
            margin: 16px 0;
            cursor: pointer;
            user-select: all;
            transition: transform 0.2s;
        }

        .suggestion-number:active {
            transform: scale(0.95);
        }

        .suggestion-info {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .suggestion-count {
            font-size: 18px;
            color: var(--warning);
            margin-top: 8px;
        }

        /* 历史记录表格 */
        .history-table {
            width: 100%;
            border-collapse: collapse;
        }

        .history-table th,
        .history-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .history-table th {
            background: var(--bg-input);
            font-weight: 600;
            color: var(--text-secondary);
        }

        .history-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .history-number {
            font-family: monospace;
            font-size: 18px;
            letter-spacing: 2px;
        }

        .a-value {
            display: inline-block;
            width: 32px;
            height: 32px;
            line-height: 32px;
            text-align: center;
            border-radius: 50%;
            font-weight: 700;
        }

        .a-value.high { background: var(--danger); color: white; animation: blink 1s infinite; }
        .a-value.medium { background: var(--warning); color: var(--bg-dark); }
        .a-value.low { background: var(--bg-input); color: var(--text-secondary); }

        @keyframes blink {
            0%, 50%, 100% { opacity: 1; }
            25%, 75% { opacity: 0.5; }
        }

        /* 标签页切换 */
        .tabs {
            display: flex;
            background: var(--bg-input);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 状态指示器 */
        .status-bar {
            display: flex;
            justify-content: space-around;
            padding: 16px;
            background: var(--bg-input);
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .status-item {
            text-align: center;
        }

        .status-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        .status-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* 进度条 */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--bg-input);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--success));
            transition: width 0.5s;
        }

        /* 胜利动画 */
        .victory-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .victory-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .victory-content {
            text-align: center;
            animation: victory-bounce 0.5s ease-out;
        }

        @keyframes victory-bounce {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .victory-text {
            font-size: 48px;
            margin-bottom: 20px;
        }

        /* 防窥模式 */
        .privacy-blur .card {
            filter: blur(10px);
            transition: filter 0.3s;
        }

        .privacy-blur .card:hover {
            filter: blur(0);
        }

        /* 快速隐藏按钮 */
        .hide-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: var(--bg-input);
            border: none;
            border-radius: 50%;
            color: var(--text-secondary);
            cursor: pointer;
            z-index: 100;
            opacity: 0.3;
            transition: opacity 0.3s;
        }

        .hide-btn:hover {
            opacity: 1;
        }

        /* 计算器伪装界面 */
        .calculator-disguise {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #1c1c1c;
            z-index: 2000;
            padding: 20px;
        }

        .calculator-disguise.show {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .calc-display {
            width: 100%;
            max-width: 300px;
            height: 80px;
            background: #333;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 20px;
            font-size: 36px;
            margin-bottom: 20px;
        }

        .calc-buttons {
            display: grid;
            grid-template-columns: repeat(4, 70px);
            gap: 10px;
        }

        .calc-btn {
            width: 70px;
            height: 70px;
            border: none;
            border-radius: 10px;
            font-size: 24px;
            cursor: pointer;
            background: #444;
            color: white;
        }

        .calc-btn.operator {
            background: #ff9500;
        }

        /* 移动端优化 */
        @media (max-width: 768px) {
            .suggestion-number {
                font-size: 36px;
            }

            .card {
                padding: 16px;
            }

            .btn {
                padding: 16px;
                font-size: 18px;
            }

            /* 大拇指点击区域 */
            .mobile-action-area {
                position: sticky;
                bottom: 0;
                background: var(--bg-card);
                padding: 16px;
                border-radius: 16px 16px 0 0;
                box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.3);
                z-index: 100;
            }

            /* 手势提示 */
            .swipe-hint {
                text-align: center;
                color: var(--text-secondary);
                font-size: 12px;
                padding: 8px;
            }
        }

        /* 初始化界面 */
        .init-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .init-screen.hidden {
            display: none;
        }

        .game-screen {
            display: none;
        }

        .game-screen.show {
            display: block;
        }

        /* 提示信息 */
        .hint {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .warning-hint {
            color: var(--danger);
            font-size: 14px;
            margin-top: 12px;
            padding: 10px;
            background: rgba(255, 71, 87, 0.1);
            border-radius: 8px;
            display: none;
        }

        .warning-hint.show {
            display: block;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* 粒子特效容器 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: particle-fall 3s linear forwards;
        }

        @keyframes particle-fall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* 反馈输入区 */
        .feedback-input {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .feedback-input input {
            flex: 1;
            padding: 14px;
            background: var(--bg-input);
            border: 2px solid transparent;
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 18px;
            text-align: center;
        }

        .feedback-input input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* 自定义猜测输入 */
        .custom-guess {
            margin-top: 16px;
            padding: 16px;
            background: var(--bg-input);
            border-radius: 12px;
        }

        /* 操作按钮组 */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .action-buttons .btn {
            flex: 1;
        }

        /* A值快速计算器 */
        .a-calculator {
            background: var(--bg-input);
            border-radius: 12px;
            padding: 16px;
        }

        /* 防守辅助提示 */
        .defense-hint {
            background: rgba(255, 165, 2, 0.1);
            border-left: 4px solid var(--warning);
            padding: 12px;
            margin-top: 12px;
            border-radius: 0 8px 8px 0;
            display: none;
        }

        .defense-hint.show {
            display: block;
        }

        /* 导出记录按钮 */
        .export-btn {
            background: none;
            border: 1px solid var(--text-secondary);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 12px;
        }

        .export-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
    </style>
</head>
<body>
    <!-- 快速隐藏按钮 -->
    <button class="hide-btn" id="hideBtn" title="快速隐藏">👁️</button>

    <!-- 计算器伪装界面 -->
    <div class="calculator-disguise" id="calculatorDisguise">
        <div class="calc-display" id="calcDisplay">0</div>
        <div class="calc-buttons">
            <button class="calc-btn">7</button>
            <button class="calc-btn">8</button>
            <button class="calc-btn">9</button>
            <button class="calc-btn operator">÷</button>
            <button class="calc-btn">4</button>
            <button class="calc-btn">5</button>
            <button class="calc-btn">6</button>
            <button class="calc-btn operator">×</button>
            <button class="calc-btn">1</button>
            <button class="calc-btn">2</button>
            <button class="calc-btn">3</button>
            <button class="calc-btn operator">-</button>
            <button class="calc-btn">0</button>
            <button class="calc-btn">.</button>
            <button class="calc-btn operator">=</button>
            <button class="calc-btn operator">+</button>
        </div>
        <button class="btn btn-secondary" style="margin-top: 20px; max-width: 300px;" id="exitDisguise">返回游戏</button>
    </div>

    <!-- 粒子特效容器 -->
    <div class="particles" id="particles"></div>

    <!-- 胜利提示 -->
    <div class="victory-overlay" id="victoryOverlay">
        <div class="victory-content">
            <div class="victory-text" id="victoryText">🎉 胜利！</div>
            <button class="btn btn-primary" onclick="game.closeVictory()">继续</button>
        </div>
    </div>

    <!-- 初始化界面 -->
    <div class="init-screen" id="initScreen">
        <div class="card" style="max-width: 400px; width: 100%;">
            <h2 class="card-title">🎯 猜数字辅助工具</h2>

            <!-- 秘密数字设置 -->
            <div class="input-group">
                <label class="input-label">设置你的秘密数字（4位）</label>
                <div class="secret-container">
                    <input type="password" id="secretInput" class="input-field" placeholder="●●●●" maxlength="4" inputmode="numeric">
                    <button type="button" class="secret-eye" id="secretEye">👁️</button>
                </div>
                <div class="hint">点击眼睛图标显示/隐藏数字</div>
            </div>

            <!-- 先后手设置 -->
            <div class="input-group">
                <label class="input-label">选择先后手</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="firstMove" name="turnOrder" value="first" checked>
                        <label class="radio-label" for="firstMove">我先猜<br><small>先手进攻</small></label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="secondMove" name="turnOrder" value="second">
                        <label class="radio-label" for="secondMove">对方先猜<br><small>后手防守</small></label>
                    </div>
                </div>
            </div>

            <!-- 开始游戏按钮 -->
            <button class="btn btn-primary" id="startGameBtn">开始游戏</button>

            <!-- 防窥模式开关 -->
            <div style="margin-top: 20px; text-align: center;">
                <label style="display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="privacyMode">
                    <span>启用防窥模式（悬停查看）</span>
                </label>
            </div>
        </div>
    </div>

    <!-- 游戏主界面 -->
    <div class="game-screen" id="gameScreen">
        <div class="container">
            <div class="main-layout">
                <!-- 左侧面板 -->
                <div class="left-panel">
                    <!-- 秘密数字卡片 -->
                    <div class="card">
                        <h3 class="card-title">🔒 我的秘密数字</h3>
                        <div class="secret-display" id="secretDisplay">●●●●</div>
                        <div class="hint">点击显示/隐藏</div>
                    </div>

                    <!-- 游戏状态 -->
                    <div class="card">
                        <h3 class="card-title">📊 游戏状态</h3>
                        <div class="status-bar">
                            <div class="status-item">
                                <div class="status-value" id="roundCount">0</div>
                                <div class="status-label">回合数</div>
                            </div>
                            <div class="status-item">
                                <div class="status-value" id="candidateCount">10000</div>
                                <div class="status-label">剩余候选</div>
                            </div>
                            <div class="status-item">
                                <div class="status-value" id="guessCount">0</div>
                                <div class="status-label">猜测次数</div>
                            </div>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                        </div>
                        <div class="hint" style="text-align: center; margin-top: 8px;">接近程度: <span id="progressText">0%</span></div>
                    </div>

                    <!-- 算法建议 -->
                    <div class="card">
                        <h3 class="card-title">🧠 智能建议</h3>
                        <div class="suggestion-box">
                            <div class="suggestion-info">建议猜测</div>
                            <div class="suggestion-number" id="suggestionNumber">????</div>
                            <div class="suggestion-count" id="suggestionInfo">剩余候选: 10000 个</div>
                        </div>

                        <!-- 操作按钮 -->
                        <div class="action-buttons">
                            <button class="btn btn-success" id="useSuggestionBtn">✅ 使用建议</button>
                            <button class="btn btn-secondary" id="customGuessBtn">✏️ 自定义</button>
                        </div>

                        <!-- 自定义猜测输入（默认隐藏） -->
                        <div class="custom-guess" id="customGuessArea" style="display: none;">
                            <input type="text" class="input-field" id="customGuessInput" placeholder="输入4位数字" maxlength="4" inputmode="numeric">
                            <button class="btn btn-primary" style="margin-top: 12px;" id="submitCustomGuess">确认猜测</button>
                        </div>

                        <!-- 反馈输入 -->
                        <div class="feedback-input">
                            <input type="number" id="feedbackA" placeholder="对方反馈A值" min="0" max="4" inputmode="numeric">
                            <button class="btn btn-primary" id="submitFeedbackBtn">提交反馈</button>
                        </div>

                        <!-- 当前猜测显示 -->
                        <div style="margin-top: 16px; text-align: center;">
                            <div class="hint">当前猜测</div>
                            <div class="history-number" id="currentGuess">等待猜测...</div>
                        </div>
                    </div>

                    <!-- A值快速计算器 -->
                    <div class="card">
                        <h3 class="card-title">🔢 A值计算器</h3>
                        <div class="a-calculator">
                            <input type="text" class="input-field" id="defenseInput" placeholder="对方猜的数字" maxlength="4" inputmode="numeric">
                            <button class="btn btn-primary" style="margin-top: 12px;" id="calculateABtn">计算A值</button>
                            <div style="margin-top: 12px; text-align: center;">
                                <div class="hint">计算结果</div>
                                <div style="font-size: 24px; color: var(--primary);" id="aResult">-</div>
                            </div>
                        </div>
                        <div class="defense-hint" id="defenseHint"></div>
                    </div>
                </div>

                <!-- 右侧面板 -->
                <div class="right-panel">
                    <!-- 标签页切换 -->
                    <div class="tabs">
                        <div class="tab active" data-tab="attack">⚔️ 进攻记录</div>
                        <div class="tab" data-tab="defense">🛡️ 防守记录</div>
                    </div>

                    <!-- 进攻记录 -->
                    <div class="tab-content active" id="attackTab">
                        <div class="card">
                            <table class="history-table">
                                <thead>
                                    <tr>
                                        <th>回合</th>
                                        <th>猜测数字</th>
                                        <th>A值</th>
                                    </tr>
                                </thead>
                                <tbody id="attackHistory">
                                    <tr>
                                        <td colspan="3" style="text-align: center; color: var(--text-secondary);">暂无记录</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- 防守记录 -->
                    <div class="tab-content" id="defenseTab">
                        <div class="card">
                            <table class="history-table">
                                <thead>
                                    <tr>
                                        <th>回合</th>
                                        <th>对方猜测</th>
                                        <th>A值</th>
                                    </tr>
                                </thead>
                                <tbody id="defenseHistory">
                                    <tr>
                                        <td colspan="3" style="text-align: center; color: var(--text-secondary);">暂无记录</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- 游戏控制 -->
                    <div class="card">
                        <h3 class="card-title">🎮 游戏控制</h3>
                        <div class="action-buttons">
                            <button class="btn btn-secondary" id="pauseBtn">⏸️ 暂停</button>
                            <button class="btn btn-danger" id="restartBtn">🔄 重新开始</button>
                        </div>
                        <button class="export-btn" id="exportBtn">📄 导出记录</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 移动端操作区 -->
        <div class="mobile-action-area" style="display: none;">
            <div class="swipe-hint">← 左滑切换记录 →</div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
